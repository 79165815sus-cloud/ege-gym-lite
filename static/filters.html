<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>План на тренировку — Качалка</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f3ff;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #7c3aed;
      --primary-hover: #6d28d9;
      --accent: #4c1d95;
      --border: #e5e7eb;
      --shadow: 0 16px 32px rgba(15, 23, 42, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Arial, sans-serif;
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(245, 243, 255, 0.92), rgba(245, 243, 255, 0.92)),
        url("/bg.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .card {
      width: 100%;
      max-width: 640px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 28px;
      position: relative;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      letter-spacing: -0.01em;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    .exam-toggle {
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .switch {
      position: relative;
      width: 54px;
      height: 30px;
      border-radius: 999px;
      background: #ede9fe;
      border: 1px solid #ddd6fe;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
      flex-shrink: 0;
    }

    .switch input {
      position: absolute;
      opacity: 0;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      z-index: 2;
    }

    .switch input:checked + .switch-visual {
      background: #ddd6fe;
      border-color: #c4b5fd;
    }

    .switch input:checked + .switch-visual::after {
      transform: translateX(26px);
    }

    .switch-visual {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: #ede9fe;
      border: 1px solid #ddd6fe;
      transition: background 0.2s ease, border-color 0.2s ease;
      pointer-events: none;
    }

    .switch-visual::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: #fff;
      box-shadow: 0 6px 12px rgba(15, 23, 42, 0.15);
      transition: transform 0.2s ease;
    }

    .exam-labels {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 12px;
      color: var(--muted);
    }

    .exam-labels strong {
      color: var(--accent);
      font-size: 13px;
    }

    .mode-labels {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 12px;
      color: var(--muted);
    }

    .mode-labels strong {
      color: var(--accent);
      font-size: 13px;
    }

    select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 14px;
      background: #fff;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .btn {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      transition: transform 0.05s ease, background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    .btn-primary:hover { background: var(--primary-hover); }

    .btn-ghost {
      background: transparent;
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-ghost:hover { background: #f5f3ff; }

    .hidden {
      display: none !important;
    }

    /* Math plan */
    .plan-list{
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      background: #fff;
    }
    .plan-row{
      display: grid;
      grid-template-columns: 70px 1fr 150px;
      gap: 10px;
      align-items: center;
      padding: 8px 6px;
      border-bottom: 1px solid rgba(229,231,235,0.7);
    }
    .plan-row:last-child{ border-bottom: none; }
    .plan-row strong{ color: var(--accent); }
    .muted{ color: var(--muted); font-size: 12px; }
    .plan-row input{
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 14px;
      background: #fff;
    }
    .total{
      margin-top: 10px;
      display:flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      font-size: 13px;
      color: var(--muted);
    }
    .total strong{ color: var(--accent); }

  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>План на тренировку</h1>
      <p class="subtitle">Выберите параметры, чтобы собрать подходящие задания</p>

      <div class="field">
        <div class="exam-toggle">
          <div class="switch" role="switch" aria-label="ЕГЭ или ОГЭ">
            <input type="checkbox" id="examSwitch" aria-label="ЕГЭ или ОГЭ">
            <div class="switch-visual"></div>
          </div>
          <div class="exam-labels">
            <strong id="examTypeText">ОГЭ</strong>
            <span>переключить на ЕГЭ</span>
          </div>
        </div>
      </div>

      <div class="field">
        <div class="exam-toggle">
          <div class="switch" role="switch" aria-label="Отдельные варианты или пробники">
            <input type="checkbox" id="modeSwitch" aria-label="Отдельные варианты или пробники">
            <div class="switch-visual"></div>
          </div>
          <div class="mode-labels">
            <strong id="modeText">Отдельные задания</strong>
            <span>переключить на Пробники</span>
          </div>
        </div>
      </div>

      <div class="field">
        <label for="subject">Предмет</label>
        <select id="subject">
          <option value="">Любой</option>
        </select>
      </div>

      <div class="field">
        <label for="examTaskNumber">Номер задания в экзамене</label>
        <select id="examTaskNumber">
          <option value="">Любой</option>
        </select>
      </div>

      <div class="field hidden" id="subtopicField">
        <label for="subtopic">Подтема</label>
        <select id="subtopic">
          <option value="">Любая</option>
        </select>
        <div class="muted" style="margin-top:6px;">Выбери подтему — и настроим тренировки по номерам внутри неё.</div>
      </div>

      <div class="field hidden" id="mathPlanField">
        <label>Сколько задач по каждому номеру</label>
        <div class="plan-list" id="mathPlanList"></div>
        <div class="total">
          <span>Итого задач: <strong id="mathTotal">0</strong></span>
          <span class="muted" id="mathHint"></span>
        </div>
      </div>

      <div class="field hidden" id="variantField">
        <label for="variantNumber">Вариант</label>
        <select id="variantNumber">
          <option value="1">Вариант 1</option>
        </select>
      </div>

      <div class="field" id="taskCountField">
        <label for="taskCount">Кол-во заданий</label>
        <select id="taskCount">
          <option value="">Любое</option>
          <option value="1">1</option>
          <option value="5">5</option>
          <option value="10" selected>10</option>
          <option value="15">15</option>
          <option value="19">19</option>
          <option value="20">20</option>
          <option value="30">30</option>
          <option value="40">40</option>
          <option value="50">50</option>
          <option value="60">60</option>
          <option value="70">70</option>
          <option value="80">80</option>
          <option value="90">90</option>
          <option value="100">100</option>
        </select>
      </div>

      <div class="row">
        <button class="btn btn-primary" onclick="applyFilters()">Начать</button>
        <button class="btn btn-ghost" onclick="resetFilters()">Сбросить</button>
      </div>
    </div>
  </div>

  <script>
    let filtersData = null;
    const initialParams = new URLSearchParams(window.location.search);
    let mathCache = null; // { examType, subject, tasks: TaskPublic[] }
    let mathCounts = {}; // { [examTaskNumber]: number }

    async function loadFilters() {
      const res = await fetch("/api/filters");
      if (!res.ok) return;
      filtersData = await res.json();

      fillSelect("subject", [
        "Математика профиль",
        "Математика база",
        "Русский язык",
        "Физика",
        "Информатика",
        "География",
        "Английский язык",
        "Литература",
        "Обществознание",
        "История",
        "Химия",
        "Биология"
      ]);
      const subjectSelect = document.getElementById("subject");
      // Apply initial values from URL (?examType=ЕГЭ|ОГЭ&subject=...&examTaskNumber=...&count=...).
      const examTypeParam = (initialParams.get("examType") || "").trim();
      const subjectParam = (initialParams.get("subject") || "").trim();
      const examTaskParam = (initialParams.get("examTaskNumber") || "").trim();
      const countParam = (initialParams.get("count") || "").trim();

      if (examTypeParam === "ЕГЭ") {
        document.getElementById("examSwitch").checked = true;
      } else if (examTypeParam === "ОГЭ") {
        document.getElementById("examSwitch").checked = false;
      }
      updateExamTypeText();

      if (subjectParam && [...subjectSelect.options].some((opt) => opt.value === subjectParam)) {
        subjectSelect.value = subjectParam;
      } else {
        subjectSelect.value = "Математика профиль";
      }
      updateExamTaskOptions();
      if (examTaskParam) {
        const examSelect = document.getElementById("examTaskNumber");
        if ([...examSelect.options].some((opt) => opt.value === examTaskParam)) {
          examSelect.value = examTaskParam;
        }
      }
      updateTaskCountOptions();
      if (countParam) {
        const countSelect = document.getElementById("taskCount");
        if ([...countSelect.options].some((opt) => opt.value === countParam)) {
          countSelect.value = countParam;
        }
      }

      await ensureMathUI();
    }

    function fillSelect(id, items) {
      const select = document.getElementById(id);
      if (!Array.isArray(items)) return;
      items.forEach((value) => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function updateExamTaskOptions() {
      const examSelect = document.getElementById("examTaskNumber");
      const subject = document.getElementById("subject").value;
      const examSwitch = document.getElementById("examSwitch");
      const previous = examSelect.value;
      examSelect.innerHTML = "<option value=\"\">Любой</option>";

      let options = [];
      if (subject === "Математика профиль") {
        options = Array.from({ length: 19 }, (_, i) => i + 1);
        if (!examSwitch.checked) {
          examSwitch.checked = true;
          updateExamTypeText();
        }
      } else if (subject === "Русский язык") {
        options = Array.from({ length: 27 }, (_, i) => i + 1);
        if (!examSwitch.checked) {
          examSwitch.checked = true;
          updateExamTypeText();
        }
      } else if (subject === "Биология") {
        options = Array.from({ length: 28 }, (_, i) => i + 1);
        if (!examSwitch.checked) {
          examSwitch.checked = true;
          updateExamTypeText();
        }
      } else if (subject === "Химия") {
        options = Array.from({ length: 34 }, (_, i) => i + 1);
        if (!examSwitch.checked) {
          examSwitch.checked = true;
          updateExamTypeText();
        }
      } else if (filtersData && Array.isArray(filtersData.examTaskNumbers)) {
        options = filtersData.examTaskNumbers;
      }

      options.forEach((value) => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        examSelect.appendChild(option);
      });

      if (previous && [...examSelect.options].some((opt) => opt.value === previous)) {
        examSelect.value = previous;
      }
    }

    function isMathSubject(subject) {
      return subject === "Математика профиль";
    }

    function setHidden(id, hidden) {
      const el = document.getElementById(id);
      if (!el) return;
      if (hidden) el.classList.add("hidden");
      else el.classList.remove("hidden");
    }

    function clearTrainingStorage() {
      sessionStorage.removeItem("trainingScores");
      sessionStorage.removeItem("trainingMeta");
      sessionStorage.removeItem("trainingList");
      sessionStorage.removeItem("giftShown");
      sessionStorage.removeItem("customSequenceTasks");
      Object.keys(sessionStorage).forEach((key) => {
        if (key.startsWith("manualScore:")) sessionStorage.removeItem(key);
      });
    }

    function shuffleInPlace(arr) {
      for (let i = arr.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        const t = arr[i];
        arr[i] = arr[j];
        arr[j] = t;
      }
      return arr;
    }

    function sampleN(items, n) {
      if (!Array.isArray(items) || n <= 0) return [];
      const copy = items.slice();
      shuffleInPlace(copy);
      return copy.slice(0, Math.min(n, copy.length));
    }

    async function ensureMathCache() {
      const subject = document.getElementById("subject").value;
      const examSwitch = document.getElementById("examSwitch");
      if (!isMathSubject(subject)) return null;

      // For now we do this flow only for ЕГЭ math профиль.
      if (!examSwitch.checked) {
        examSwitch.checked = true;
        updateExamTypeText();
      }
      const examType = "ЕГЭ";
      const key = `${examType}::${subject}`;
      if (mathCache && mathCache.key === key) return mathCache;

      const params = new URLSearchParams();
      params.set("examType", examType);
      params.set("subject", subject);
      const res = await fetch("/api/tasks-public?" + params.toString());
      if (!res.ok) return null;
      const tasks = await res.json();
      mathCache = { key, examType, subject, tasks: Array.isArray(tasks) ? tasks : [] };
      return mathCache;
    }

    function renderMathSubtopics(cache) {
      const select = document.getElementById("subtopic");
      const prev = select.value;
      select.innerHTML = "<option value=\"\">Любая</option>";

      const seen = new Set();
      const items = [];
      (cache.tasks || []).forEach((t) => {
        const s = (t && t.subtopic ? String(t.subtopic) : "").trim();
        if (!s) return;
        if (seen.has(s)) return;
        seen.add(s);
        items.push(s);
      });
      items.sort((a, b) => a.localeCompare(b, "ru"));
      items.forEach((s) => {
        const opt = document.createElement("option");
        opt.value = s;
        opt.textContent = s;
        select.appendChild(opt);
      });

      if (prev && [...select.options].some((o) => o.value === prev)) {
        select.value = prev;
      }
    }

    function renderMathPlanList(cache) {
      const list = document.getElementById("mathPlanList");
      const totalEl = document.getElementById("mathTotal");
      const hintEl = document.getElementById("mathHint");

      const subtopic = (document.getElementById("subtopic").value || "").trim();
      const tasks = (cache.tasks || []).filter((t) => {
        if (!subtopic) return true;
        return String(t.subtopic || "").trim() === subtopic;
      });

      const byNum = new Map();
      tasks.forEach((t) => {
        const n = Number(t.examTaskNumber);
        if (!Number.isFinite(n) || n <= 0) return;
        if (!byNum.has(n)) byNum.set(n, []);
        byNum.get(n).push(t);
      });

      const numbers = Array.from(byNum.keys()).sort((a, b) => a - b);
      if (!numbers.length) {
        list.innerHTML = "<div class=\"muted\">Нет задач под выбранную подтему.</div>";
        totalEl.textContent = "0";
        hintEl.textContent = "";
        return;
      }

      // Keep only relevant counts
      const nextCounts = {};
      numbers.forEach((n) => {
        const raw = mathCounts[String(n)];
        const max = byNum.get(n).length;
        const val = Number(raw);
        nextCounts[String(n)] = Number.isFinite(val) ? Math.max(0, Math.min(val, max)) : 0;
      });
      mathCounts = nextCounts;

      list.innerHTML = "";
      let total = 0;
      numbers.forEach((n) => {
        const max = byNum.get(n).length;
        const key = String(n);
        const val = mathCounts[key] || 0;
        total += val;

        const row = document.createElement("div");
        row.className = "plan-row";
        row.innerHTML = `
          <div><strong>№${n}</strong></div>
          <div class="muted">Доступно: ${max}</div>
          <div><input type="number" inputmode="numeric" min="0" max="${max}" value="${val}" data-num="${n}" aria-label="Количество задач для номера ${n}"/></div>
        `;
        list.appendChild(row);
      });
      totalEl.textContent = String(total);
      hintEl.textContent = total > 0 ? "План будет собран случайно из доступных задач." : "Выбери хотя бы 1 задачу.";

      list.querySelectorAll("input[data-num]").forEach((inp) => {
        inp.addEventListener("change", () => {
          const num = inp.getAttribute("data-num");
          const max = Number(inp.getAttribute("max") || "0");
          const v = Number(inp.value);
          const safe = Number.isFinite(v) ? Math.max(0, Math.min(v, max)) : 0;
          inp.value = String(safe);
          mathCounts[String(num)] = safe;
          renderMathPlanList(cache);
        });
      });
    }

    async function ensureMathUI() {
      const subject = document.getElementById("subject").value;
      const math = isMathSubject(subject);

      // Fields toggling
      const modeField = document.getElementById("modeSwitch").closest(".field");
      setHidden(modeField ? modeField.id : "", false); // no-op, keep safe

      setHidden("subtopicField", !math);
      setHidden("mathPlanField", !math);

      // Hide old controls for math-only flow
      const examField = document.getElementById("examTaskNumber").closest(".field");
      if (examField) {
        if (math) examField.classList.add("hidden");
        else examField.classList.remove("hidden");
      }
      setHidden("taskCountField", math);
      setHidden("variantField", true);
      // Hide mode switch for math (to avoid confusion)
      const modeSwitchField = document.getElementById("modeSwitch").closest(".field");
      if (modeSwitchField) {
        if (math) modeSwitchField.classList.add("hidden");
        else modeSwitchField.classList.remove("hidden");
      }

      if (!math) return;
      const cache = await ensureMathCache();
      if (!cache) return;
      renderMathSubtopics(cache);
      renderMathPlanList(cache);
    }

    async function updateTaskCountOptions() {
      const modeSwitch = document.getElementById("modeSwitch");
      if (modeSwitch.checked) return;
      const taskCountSelect = document.getElementById("taskCount");
      const subject = document.getElementById("subject").value;
      const examSwitch = document.getElementById("examSwitch");
      const examTaskNumber = document.getElementById("examTaskNumber").value;
      const previous = taskCountSelect.value;
      taskCountSelect.innerHTML = "<option value=\"\">Любое</option>";
      if (!subject) return;

      const params = new URLSearchParams();
      params.set("examType", examSwitch.checked ? "ЕГЭ" : "ОГЭ");
      params.set("subject", subject);
      if (examTaskNumber) params.set("examTaskNumber", examTaskNumber);
      const listUrl = "/api/tasks-public?" + params.toString();
      const res = await fetch(listUrl);
      if (!res.ok) return;
      const items = await res.json();
      const max = Array.isArray(items) ? items.length : 0;
      if (max <= 0) return;

      const base = [1, 5, 10, 15, 20, 30, 40, 50, 60, 70, 80, 90, 100];
      const values = base.filter((value) => value <= max);
      if (!values.includes(max)) values.push(max);
      values.sort((a, b) => a - b);
      values.forEach((value) => {
        const option = document.createElement("option");
        option.value = String(value);
        option.textContent = value === max ? `Все (${value})` : String(value);
        taskCountSelect.appendChild(option);
      });
      if (previous && [...taskCountSelect.options].some((opt) => opt.value === previous)) {
        taskCountSelect.value = previous;
      } else if (values.includes(10)) {
        taskCountSelect.value = "10";
      } else {
        taskCountSelect.value = String(max);
      }
    }

    function getVariantCountBySubject(subject) {
      if (subject === "Русский язык") return "27";
      if (subject === "Математика профиль") return "19";
      if (subject === "Биология") return "28";
      if (subject === "Химия") return "34";
      return "";
    }

    function applyFilters() {
      const params = new URLSearchParams();
      const examSwitch = document.getElementById("examSwitch");
      const modeSwitch = document.getElementById("modeSwitch");
      const examType = examSwitch.checked ? "ЕГЭ" : "ОГЭ";
      const subject = document.getElementById("subject").value;
      const examTaskNumber = document.getElementById("examTaskNumber").value;
      const taskCountSelect = document.getElementById("taskCount");
      const taskCount = taskCountSelect.value;
      const variantNumber = document.getElementById("variantNumber").value;

      // New flow: Math профиль → подтема → по каждому номеру выбрать кол-во задач.
      if (isMathSubject(subject)) {
        startMathPlan();
        return;
      }

      if (examType) params.set("examType", examType);
      if (subject) params.set("subject", subject);
      if (modeSwitch.checked) {
        params.set("sequence", "1");
        const variantCount = getVariantCountBySubject(subject);
        if (variantCount) params.set("count", variantCount);
        if (variantNumber) params.set("variant", variantNumber);
      } else {
      if (examTaskNumber) params.set("examTaskNumber", examTaskNumber);
        if (taskCount) params.set("count", taskCount);
      }

      const url = params.toString() ? "/train?" + params.toString() : "/train";
      window.location.href = url;
    }

    async function startMathPlan() {
      const subject = document.getElementById("subject").value;
      const subtopic = (document.getElementById("subtopic").value || "").trim();
      const cache = await ensureMathCache();
      if (!cache) return;

      const tasks = (cache.tasks || []).filter((t) => {
        if (!subtopic) return true;
        return String(t.subtopic || "").trim() === subtopic;
      });
      const byNum = new Map();
      tasks.forEach((t) => {
        const n = Number(t.examTaskNumber);
        if (!Number.isFinite(n) || n <= 0) return;
        if (!byNum.has(n)) byNum.set(n, []);
        byNum.get(n).push(t);
      });

      let selected = [];
      Object.keys(mathCounts).forEach((k) => {
        const n = Number(k);
        const want = Number(mathCounts[k] || 0);
        if (!Number.isFinite(n) || !Number.isFinite(want) || want <= 0) return;
        const pool = byNum.get(n) || [];
        selected = selected.concat(sampleN(pool, want));
      });

      if (!selected.length) {
        // Nothing selected; keep user on page.
        const hintEl = document.getElementById("mathHint");
        if (hintEl) hintEl.textContent = "Выбери хотя бы 1 задачу, чтобы начать.";
        return;
      }

      // Shuffle final plan so it feels like a mixed workout.
      shuffleInPlace(selected);

      clearTrainingStorage();
      sessionStorage.setItem("customSequenceTasks", JSON.stringify(selected));

      const p = new URLSearchParams();
      p.set("sequence", "1");
      p.set("custom", "1");
      p.set("examType", "ЕГЭ");
      p.set("subject", subject);
      if (subtopic) p.set("subtopic", subtopic);
      p.set("count", String(selected.length));
      window.location.href = "/train?" + p.toString();
    }

    function resetFilters() {
      document.getElementById("examSwitch").checked = false;
      updateExamTypeText();
      document.getElementById("subject").value = "";
      document.getElementById("examTaskNumber").value = "";
      document.getElementById("taskCount").value = "";
    }

    function updateExamTypeText() {
      const examSwitch = document.getElementById("examSwitch");
      const label = document.getElementById("examTypeText");
      const hint = label.nextElementSibling;
      if (examSwitch.checked) {
        label.innerText = "ЕГЭ";
        if (hint) hint.innerText = "переключить на ОГЭ";
      } else {
        label.innerText = "ОГЭ";
        if (hint) hint.innerText = "переключить на ЕГЭ";
      }
    }

    function updateModeText() {
      const modeSwitch = document.getElementById("modeSwitch");
      const label = document.getElementById("modeText");
      const hint = label.nextElementSibling;
      if (modeSwitch.checked) {
        label.innerText = "Пробники";
        if (hint) hint.innerText = "переключить на Отдельные задания";
      } else {
        label.innerText = "Отдельные задания";
        if (hint) hint.innerText = "переключить на Пробники";
      }
    }

    function handleExamTaskChange() {
      const examTaskNumber = document.getElementById("examTaskNumber").value;
      const taskCountSelect = document.getElementById("taskCount");
      // no-op
    }

    function updateModeVisibility() {
      const modeSwitch = document.getElementById("modeSwitch");
      const examField = document.getElementById("examTaskNumber").closest(".field");
      const variantField = document.getElementById("variantField");
      const taskCountField = document.getElementById("taskCountField");
      if (modeSwitch.checked) {
        examField.classList.add("hidden");
        variantField.classList.remove("hidden");
        taskCountField.classList.add("hidden");
      } else {
        examField.classList.remove("hidden");
        variantField.classList.add("hidden");
        taskCountField.classList.remove("hidden");
      }
    }

    document.getElementById("subject").addEventListener("change", () => {
      updateExamTaskOptions();
      updateTaskCountOptions();
      ensureMathUI();
    });
    document.getElementById("examTaskNumber").addEventListener("change", () => {
      handleExamTaskChange();
      updateTaskCountOptions();
    });
    document.getElementById("examSwitch").addEventListener("change", () => {
      updateExamTypeText();
      updateTaskCountOptions();
      ensureMathUI();
    });
    document.getElementById("modeSwitch").addEventListener("change", () => {
      updateModeText();
      updateModeVisibility();
    });
    document.getElementById("subtopic").addEventListener("change", () => {
      if (mathCache) renderMathPlanList(mathCache);
    });
    updateExamTypeText();
    updateModeText();
    updateModeVisibility();
    loadFilters();
  </script>
</body>
</html>
