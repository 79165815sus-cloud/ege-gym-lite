<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Качалка — Простая версия</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f3ff;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #7c3aed;
      --primary-hover: #6d28d9;
      --accent: #4c1d95;
      --border: #e5e7eb;
      --shadow: 0 16px 32px rgba(15, 23, 42, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Arial, sans-serif;
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(245, 243, 255, 0.92), rgba(245, 243, 255, 0.92)),
        url("/bg.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .card {
      width: 100%;
      max-width: 640px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
      color: var(--accent);
    }

    .question {
      margin: 0 0 16px;
      padding: 14px 16px;
      background: #f5f3ff;
      border: 1px solid #ddd6fe;
      border-radius: 12px;
      font-size: 20px;
      font-weight: 600;
    }

    .question-image {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      border-radius: 12px;
      border: 1px solid #e9d5ff;
      margin: 0 0 16px;
      background: #fff;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    input[type="number"] {
      flex: 1 1 140px;
      min-width: 140px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 16px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      background: #fff;
    }

    input[type="number"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.18);
    }

    .btn {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      transition: transform 0.05s ease, background 0.15s ease;
    }

    .btn:hover { background: #f8fafc; }
    .btn:active { transform: translateY(1px); }

    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    .btn-primary:hover { background: var(--primary-hover); }

    .btn-ghost {
      background: transparent;
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-ghost:hover { background: #f5f3ff; }

    .result {
      margin: 12px 0 0;
      font-weight: 600;
    }

    .result.ok { color: #16a34a; }
    .result.bad { color: #b91c1c; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>Качалка</h1>

      <p id="question" class="question">Загрузка...</p>
      <img id="questionImage" class="question-image hidden" alt="Иллюстрация к заданию">

      <div class="row">
        <input id="answer" type="number" placeholder="Введите ответ"/>
        <button class="btn btn-primary" onclick="check()">Проверить</button>
        <button class="btn btn-ghost" onclick="load()">Следующая</button>
      </div>

      <div class="row">
        <button class="btn" onclick="startHints()">Подсказка</button>
        <button class="btn" onclick="showTheory()">Теория</button>
        <button class="btn hidden" id="hintNext" type="button">Дальше</button>
      </div>

      <p id="result" class="result"></p>
      <p id="hintText" class="result hidden" style="font-weight: 500; color: #4c1d95;"></p>
      <p id="theoryText" class="result hidden" style="font-weight: 500; color: #4c1d95;"></p>
    </div>
  </div>

  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)'], ['$', '$']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <script>
    let currentTask;
    let hintSteps = null;
    let hintStepIndex = 0;
    const anonId = getAnonId();

    async function load() {
      const params = new URLSearchParams(window.location.search);
      const url = params.toString() ? "/api/task?" + params.toString() : "/api/task";
      const res = await fetch(url);
      if (!res.ok) {
        document.getElementById("question").innerText = "Нет задач под выбранные фильтры.";
        return;
      }
      currentTask = await res.json();
      setMathText(document.getElementById("question"), currentTask.question);
      trackEvent("task_view", {
        task_id: currentTask.id,
        subject: currentTask.subject,
        exam_type: currentTask.examType,
        exam_task_number: currentTask.examTaskNumber
      });
      const questionImage = document.getElementById("questionImage");
      if (currentTask.imageUrl) {
        questionImage.src = currentTask.imageUrl;
        questionImage.classList.remove("hidden");
      } else {
        questionImage.classList.add("hidden");
        questionImage.removeAttribute("src");
      }
      setMathText(document.getElementById("result"), "");
      setMathText(document.getElementById("hintText"), "");
      setMathText(document.getElementById("theoryText"), "");
      document.getElementById("hintText").classList.add("hidden");
      document.getElementById("theoryText").classList.add("hidden");
      document.getElementById("hintNext").classList.add("hidden");
      hintSteps = null;
      hintStepIndex = 0;
      document.getElementById("answer").value = "";
    }

    async function check() {
      const answer = document.getElementById("answer").value.trim();
      trackEvent("check_answer", { task_id: currentTask.id });
      const res = await fetch("/api/check", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id: currentTask.id, answer })
      });
      const data = await res.json();
      const resultEl = document.getElementById("result");
      setMathText(resultEl, data.correct ? "✅ Верно" : "❌ Неверно");
      resultEl.classList.toggle("ok", data.correct);
      resultEl.classList.toggle("bad", !data.correct);
    }

    function formatHintStep(step) {
      if (!step) return "Нет данных.";
      const hint = step.hint ? step.hint.trim() : "";
      return hint || "Нет данных.";
    }

    function formatHintStepsUpTo(indexInclusive) {
      if (!Array.isArray(hintSteps) || hintSteps.length === 0) return "Нет данных.";
      const maxIndex = Math.min(Math.max(indexInclusive, 0), hintSteps.length - 1);
      const parts = [];
      for (let i = 0; i <= maxIndex; i += 1) {
        const step = hintSteps[i];
        const text = formatHintStep(step);
        const stepNo = (step && Number.isFinite(Number(step.step))) ? Number(step.step) : (i + 1);
        parts.push(`Шаг ${stepNo}\n${text}`);
      }
      return parts.join("\n\n");
    }

    function renderHintStep() {
      const hintEl = document.getElementById("hintText");
      const nextBtn = document.getElementById("hintNext");
      if (!Array.isArray(hintSteps) || hintSteps.length === 0) {
        setMathText(hintEl, "Подсказка: нет данных.");
        hintEl.classList.remove("hidden");
        nextBtn.classList.add("hidden");
        return;
      }
      if (hintStepIndex < 0) hintStepIndex = 0;
      if (hintStepIndex >= hintSteps.length) hintStepIndex = hintSteps.length - 1;
      setMathText(hintEl, formatHintStepsUpTo(hintStepIndex));
      hintEl.classList.remove("hidden");
      const isLast = hintStepIndex >= hintSteps.length - 1;
      if (isLast) {
        nextBtn.classList.add("hidden");
      } else {
        nextBtn.classList.remove("hidden");
        nextBtn.textContent = "Дальше";
      }
      const step = hintSteps[hintStepIndex];
      trackEvent("show_hint_step", { task_id: currentTask.id, step: step && step.step ? step.step : (hintStepIndex + 1) });
    }

    async function startHints() {
      if (!currentTask || !currentTask.id) return;
      if (Array.isArray(hintSteps) && hintSteps.length > 0) {
        renderHintStep();
        return;
      }

      const res = await fetch("/api/hints", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id: currentTask.id, steps: [1,2,3,4] })
      });
      const hintEl = document.getElementById("hintText");
      const nextBtn = document.getElementById("hintNext");
      if (!res.ok) {
        setMathText(hintEl, "Подсказка: нет данных.");
        hintEl.classList.remove("hidden");
        nextBtn.classList.add("hidden");
        return;
      }
      const data = await res.json();
      hintSteps = (data && Array.isArray(data.steps)) ? data.steps : [];
      hintStepIndex = 0;
      renderHintStep();
    }

    async function showTheory() {
      if (!currentTask || !currentTask.id) return;
      const theoryEl = document.getElementById("theoryText");
      const res = await fetch("/api/theory", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id: currentTask.id })
      });
      if (!res.ok) {
        setMathText(theoryEl, "Теория: нет данных.");
        theoryEl.classList.remove("hidden");
        return;
      }
      const data = await res.json();
      const raw = data && typeof data.theory === "string" ? data.theory : "";
      const url = extractFirstUrl(raw);
      if (url) {
        window.open(url, "_blank", "noopener,noreferrer");
        trackEvent("open_theory_link", { task_id: currentTask.id, url });
        return;
      }
      const text = String(raw || "").trim();
      setMathText(theoryEl, text ? ("Теория:\n" + text) : "Теория: пока не добавлено.");
      theoryEl.classList.remove("hidden");
      trackEvent("show_theory", { task_id: currentTask.id });
    }

    function extractFirstUrl(text) {
      const raw = String(text || "").trim();
      if (!raw) return "";
      const match = raw.match(/https?:\/\/[^\s<>"')\]]+/i);
      return match ? String(match[0]) : "";
    }

    document.getElementById("hintNext").addEventListener("click", () => {
      if (!Array.isArray(hintSteps) || hintSteps.length === 0) return;
      if (hintStepIndex >= hintSteps.length - 1) return;
      hintStepIndex += 1;
      renderHintStep();
    });

    function setMathText(element, text) {
      element.textContent = text || "";
      if (window.MathJax && window.MathJax.typesetPromise) {
        window.MathJax.typesetPromise([element]);
      }
    }

    function getAnonId() {
      const key = "anon_id";
      let value = localStorage.getItem(key);
      if (!value) {
        value = crypto.randomUUID();
        localStorage.setItem(key, value);
      }
      return value;
    }

    function trackEvent(event, properties) {
      fetch("/api/track", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          anon_id: anonId,
          event,
          properties: properties || {},
          path: window.location.pathname
        })
      }).catch(() => {});
    }

    document.getElementById("answer").addEventListener("keydown", (event) => {
      if (event.key === "Enter") check();
    });

    trackEvent("page_view");
    load();
  </script>
</body>
</html>
